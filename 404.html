<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      sessionStorage.redirect = location.href;
      location.replace(
        location.origin + 
        location.pathname.split('/').slice(0, -1).join('/') + 
        '/?redirect=' + 
        encodeURIComponent(location.pathname + location.search + location.hash)
      );
    </script>
  </head>
  <body></body>
</html>
