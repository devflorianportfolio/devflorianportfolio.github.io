  <body>
    <div id="root"></div>

    <script>
      (function() {
        var ua = navigator.userAgent || '';
        var isInstagram = /Instagram/.test(ua);
        var isIOS = /iPhone|iPad|iPod/.test(ua);
        var isAndroid = /Android/.test(ua);

        if (isInstagram) {
          if (isIOS) {
            document.addEventListener('DOMContentLoaded', function() {
              var banner = document.createElement('div');
              banner.id = 'ig-open-banner';
              banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#000;color:#fff;text-align:center;padding:14px 16px;font-family:sans-serif;font-size:15px;display:flex;align-items:center;justify-content:space-between;';
              banner.innerHTML = '<span>Pour une meilleure expérience,</span><button onclick="window.location.href=\'x-safari-https://www.florianmtgn.fr\'" style="background:#fff;color:#000;border:none;padding:8px 14px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;">Ouvrir dans Safari</button>';
              document.body.prepend(banner);
            });
          } else if (isAndroid) {
            window.location.href = 'intent://' + location.host + location.pathname + location.search + '#Intent;scheme=https;package=com.android.chrome;end';
          }
        }

        try {
          var redirect = sessionStorage.redirect;
          delete sessionStorage.redirect;
          if (redirect && redirect !== location.href) {
            history.replaceState(null, null, redirect);
          }
        } catch(e) {}
      })();
    </script>
